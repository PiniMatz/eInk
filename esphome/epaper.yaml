esphome:
  name: epaper-calendar
  friendly_name: ePaper Hebrew Calendar
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: 250.0
    then:
      - lambda: |-
          id(screen_image).resize(800, 480);
      - delay: 10s
      - online_image.set_url:
          id: screen_image
          url: "https://e-ink-pini.vercel.app/api/screen"

esp32:
  board: seeed_xiao_esp32c3
  variant: esp32c3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_MBEDTLS_DYNAMIC_BUFFER: "y"
      CONFIG_MBEDTLS_DYNAMIC_FREE_CONFIG_DATA: "y"
      CONFIG_MBEDTLS_DYNAMIC_FREE_CA_CERT: "y"
      CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN: "16384"
      CONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN: "4096"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "20"

# Enable logging
logger:
  level: INFO

# Enable native API for Home Assistant (optional)
# api:

# Enable OTA updates (Over The Air)
ota:
  - platform: esphome

# Wi-Fi Configuration
wifi:
  ssid: "Pini"
  password: "PiniRules"
  ap:
    ssid: "E-Paper Setup"
    ap_timeout: 15s

# Disable captive portal to save memory
# captive_portal:

# HTTP Request client (bypass TLS check to avoid memory crash on HTTPS fetches)
http_request:
  useragent: esphome/device
  timeout: 15s
  verify_ssl: false

# SPI interface configuration for Seeed Studio XIAO ESP32-C3
spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

# Display configuration for the 7.5" Waveshare ePaper screen
display:
  - platform: waveshare_epaper
    id: my_display
    model: 7.50inV2
    cs_pin: GPIO4
    dc_pin: GPIO5
    reset_pin: GPIO2
    update_interval: 30min
    lambda: |-
      if (id(screen_image).is_ready()) {
        it.image(0, 0, id(screen_image));
      } else {
        it.fill(COLOR_OFF);
      }

# Online Image component that fetches pre-rendered BMP from the Vercel app
online_image:
  - id: screen_image
    url: "https://e-ink-pini.vercel.app/api/screen"
    format: bmp
    type: BINARY
    update_interval: 30min
    on_download_finished:
      - component.update: my_display
