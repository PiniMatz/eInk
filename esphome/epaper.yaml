esphome:
  name: epaper-calendar
  friendly_name: ePaper Hebrew Calendar
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: 0.0
    then:
      - delay: 10s
      - online_image.set_url:
          id: screen_image
          url: "https://e-ink-pini.vercel.app/api/screen"

esp32:
  board: seeed_xiao_esp32c3
  variant: esp32c3
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable native API for Home Assistant (optional)
# api:

# Enable OTA updates (Over The Air)
ota:
  - platform: esphome

# Wi-Fi Configuration
wifi:
  ssid: "Matzner"
  password: "MatznerFamily"
  ap:
    ssid: "E-Paper Setup"
    ap_timeout: 15s
  on_connect:
    then:
      - component.update: screen_image

# Enable captive portal
captive_portal:

# HTTP Request client (bypass TLS check to avoid memory crash on HTTPS fetches)
http_request:
  useragent: esphome/device
  timeout: 15s
  verify_ssl: false

# Font configuration for local on-screen instructions
font:
  - file: "Rubik-Bold.ttf"
    id: rubik_font
    size: 26

# SPI interface configuration for Seeed Studio XIAO ESP32-C3
spi:
  clk_pin: GPIO8
  mosi_pin: GPIO10

# Display configuration for the 7.5" Waveshare ePaper screen
display:
  - platform: waveshare_epaper
    id: my_display
    model: 7.50inV2
    cs_pin: GPIO4
    dc_pin: GPIO5
    reset_pin: GPIO2
    update_interval: 30min
    lambda: |-
      if (id(screen_image).is_ready()) {
        it.image(0, 0, id(screen_image));
      } else {
        it.fill(COLOR_OFF);
        it.print(400, 160, id(rubik_font), COLOR_ON, TextAlign::CENTER, "Wi-Fi Config Mode");
        it.print(400, 220, id(rubik_font), COLOR_ON, TextAlign::CENTER, "Connect to: E-Paper Setup");
        it.print(400, 270, id(rubik_font), COLOR_ON, TextAlign::CENTER, "Open browser at: 192.168.4.1");
      }

# Online Image component that fetches pre-rendered BMP from the Vercel app
online_image:
  - id: screen_image
    url: "https://e-ink-pini.vercel.app/api/screen"
    format: bmp
    type: BINARY
    update_interval: 30min
    on_download_finished:
      - component.update: my_display
